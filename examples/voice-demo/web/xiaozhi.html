<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xiaozhi WebSocket 语音演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #ddd;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .mode-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .mode-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-connect {
            background: #667eea;
            color: white;
        }

        .btn-connect:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-connect:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-record {
            background: #f56565;
            color: white;
        }

        .btn-record:hover:not(:disabled) {
            background: #e53e3e;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(245, 101, 101, 0.3);
        }

        .btn-record:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-stop {
            background: #48bb78;
            color: white;
        }

        .btn-stop:hover:not(:disabled) {
            background: #38a169;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(72, 187, 120, 0.3);
        }

        .btn-stop:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.connecting {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #fcd34d;
        }

        .status.connected {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }

        .status.connecting .status-dot {
            background: #f59e0b;
            animation: pulse 1s infinite;
        }

        .status.connected .status-dot {
            background: #10b981;
        }

        .status.error .status-dot {
            background: #ef4444;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .messages {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .message {
            margin-bottom: 10px;
            padding: 8px;
            border-radius: 4px;
            word-break: break-all;
        }

        .message.sent {
            background: #dbeafe;
            color: #1e40af;
        }

        .message.received {
            background: #dcfce7;
            color: #166534;
        }

        .message.error {
            background: #fee2e2;
            color: #991b1b;
        }

        .message.info {
            background: #f3e8ff;
            color: #6b21a8;
        }

        .timestamp {
            color: #999;
            font-size: 12px;
            margin-right: 8px;
        }

        .info-box {
            background: #f0f9ff;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
            color: #1e40af;
            line-height: 1.6;
        }

        .info-box h3 {
            margin-bottom: 8px;
            font-size: 14px;
        }

        .info-box code {
            background: white;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Xiaozhi WebSocket 语音演示</h1>
        <p class="subtitle">客户端在 hello 消息中指定模式（pipeline 或 realtime）</p>

        <div class="mode-selector">
            <button class="mode-btn active" data-mode="pipeline">Pipeline 模式</button>
            <button class="mode-btn" data-mode="realtime">Realtime 模式</button>
        </div>

        <div class="controls">
            <button class="btn-connect" id="btnConnect">连接</button>
            <button class="btn-record" id="btnRecord" disabled>开始</button>
            <button class="btn-stop" id="btnStop" disabled>停止</button>
        </div>

        <div class="status" id="status">
            <span class="status-dot"></span>
            <span id="statusText">未连接</span>
        </div>

        <div class="messages" id="messages"></div>

        <div class="info-box">
            <h3>协议说明</h3>
            <p>
                <strong>Hello 消息：</strong> 客户端在 hello 消息中指定 <code>"mode"</code> 字段<br>
                <strong>Pipeline：</strong> ASR → Dialog LLM → TTS<br>
                <strong>Realtime：</strong> 直接多模态 Agent 交互<br>
                <strong>默认模式：</strong> 如果不指定 mode，默认为 pipeline
            </p>
        </div>
    </div>

    <script>
        const WS_URL = 'ws://localhost:8080/xiaozhi/v1/';
        
        let ws = null;
        let selectedMode = 'pipeline';
        let audioContext = null;
        let analyser = null;
        let scriptProcessor = null;
        let isRecording = false;
        let audioSendInterval = null;
        let audioQueue = [];
        let isPlaying = false;
        
        // Latency measurement
        let recordStartTime = null;
        let recordStopTime = null;
        let firstAudioReceivedTime = null;

        const elements = {
            btnConnect: document.getElementById('btnConnect'),
            btnRecord: document.getElementById('btnRecord'),
            btnStop: document.getElementById('btnStop'),
            status: document.getElementById('status'),
            statusText: document.getElementById('statusText'),
            messages: document.getElementById('messages'),
            modeBtns: document.querySelectorAll('.mode-btn')
        };

        // Mode selector
        elements.modeBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (!ws || ws.readyState !== WebSocket.OPEN) {
                    elements.modeBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    selectedMode = btn.dataset.mode;
                }
            });
        });

        // Connect button
        elements.btnConnect.addEventListener('click', async () => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.close();
                return;
            }

            try {
                setStatus('connecting', '连接中...');
                ws = new WebSocket(WS_URL + '?device_id=web-client');

                ws.onopen = () => {
                    setStatus('connected', '已连接');
                    elements.btnConnect.textContent = '断开';
                    elements.btnRecord.disabled = false;
                    addMessage('info', '已连接到服务器');
                    
                    // Send hello message with mode
                    const hello = {
                        type: 'hello',
                        version: 1,
                        audio_params: {
                            format: 'pcm',
                            sample_rate: 16000,
                            channels: 1,
                            frame_duration: 60,
                            bit_depth: 16
                        },
                        mode: selectedMode
                    };
                    addMessage('sent', `发送 hello 消息 (mode=${selectedMode})`);
                    ws.send(JSON.stringify(hello));
                };

                ws.onmessage = (event) => {
                    // Check if it's binary data (audio) or text data (JSON)
                    if (event.data instanceof ArrayBuffer || event.data instanceof Blob) {
                        // Binary audio data - queue for playback
                        if (!firstAudioReceivedTime && recordStopTime) {
                            firstAudioReceivedTime = Date.now();
                            const latency = firstAudioReceivedTime - recordStopTime;
                            addMessage('info', `⏱️ 延迟 (停止→首包): ${latency}ms`);
                        }
                        
                        if (event.data instanceof Blob) {
                            event.data.arrayBuffer().then(buffer => {
                                audioQueue.push(new Uint8Array(buffer));
                                addMessage('received', `[音频数据] ${event.data.size} 字节`);
                                playAudioQueue();
                            });
                        } else {
                            audioQueue.push(new Uint8Array(event.data));
                            addMessage('received', `[音频数据] ${event.data.byteLength} 字节`);
                            playAudioQueue();
                        }
                    } else {
                        // Text data - parse as JSON
                        try {
                            const msg = JSON.parse(event.data);
                            handleMessage(msg);
                        } catch (e) {
                            addMessage('error', `解析消息失败: ${e.message}`);
                        }
                    }
                };

                ws.onerror = (error) => {
                    setStatus('error', '连接错误');
                    addMessage('error', `WebSocket 错误: ${error}`);
                };

                ws.onclose = () => {
                    setStatus('error', '已断开');
                    elements.btnConnect.textContent = '连接';
                    elements.btnRecord.disabled = true;
                    elements.btnStop.disabled = true;
                    addMessage('info', '连接已关闭');
                };
            } catch (error) {
                setStatus('error', `连接失败: ${error.message}`);
                addMessage('error', error.message);
            }
        });

        // Play audio from queue
        function playAudioQueue() {
            if (isPlaying || audioQueue.length === 0) {
                return;
            }
            
            isPlaying = true;
            const audioData = audioQueue.shift();
            
            // Create audio context for playback if needed
            if (!audioContext || audioContext.state === 'closed') {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            
            try {
                // Convert int16 PCM to float32
                const float32Data = new Float32Array(audioData.length / 2);
                const dataView = new DataView(audioData.buffer, audioData.byteOffset, audioData.byteLength);
                
                let min = 0, max = 0;
                for (let i = 0; i < float32Data.length; i++) {
                    const sample = dataView.getInt16(i * 2, true); // true = little endian
                    const normalized = sample / 32768.0;
                    float32Data[i] = normalized;
                    min = Math.min(min, normalized);
                    max = Math.max(max, normalized);
                }
                
                // Check if audio data is valid
                if (max === 0 && min === 0) {
                    addMessage('info', '收到空音频帧，跳过');
                    isPlaying = false;
                    if (audioQueue.length > 0) {
                        playAudioQueue();
                    }
                    return;
                }
                
                // Create audio buffer with proper sample rate
                const audioBuffer = audioContext.createBuffer(1, float32Data.length, 16000);
                const channelData = audioBuffer.getChannelData(0);
                
                // Copy data with clipping to prevent distortion
                for (let i = 0; i < float32Data.length; i++) {
                    channelData[i] = Math.max(-1, Math.min(1, float32Data[i]));
                }
                
                // Create and play source
                const source = audioContext.createBufferSource();
                source.buffer = audioBuffer;
                
                // Add a gain node for volume control
                const gainNode = audioContext.createGain();
                gainNode.gain.value = 1.0; // Full volume (audio is already normalized)
                
                source.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                source.onended = () => {
                    isPlaying = false;
                    // Play next audio in queue
                    if (audioQueue.length > 0) {
                        playAudioQueue();
                    }
                };
                
                source.start(0);
            } catch (error) {
                addMessage('error', `播放音频失败: ${error.message}`);
                isPlaying = false;
                if (audioQueue.length > 0) {
                    playAudioQueue();
                }
            }
        }

        // Resample audio to 16kHz using high-quality linear interpolation
        function resampleAudio(audioData, fromSampleRate, toSampleRate) {
            if (fromSampleRate === toSampleRate) {
                return audioData;
            }
            
            const ratio = fromSampleRate / toSampleRate;
            const newLength = Math.round(audioData.length / ratio);
            const resampled = new Int16Array(newLength);
            
            for (let i = 0; i < newLength; i++) {
                const pointerf = i * ratio;
                const pointerInt = Math.floor(pointerf);
                const pointerNextInt = Math.min(pointerInt + 1, audioData.length - 1);
                const interpolationValue = pointerf % 1.0;
                
                // Linear interpolation
                const s0 = audioData[pointerInt];
                const s1 = audioData[pointerNextInt];
                const interpolated = s0 * (1 - interpolationValue) + s1 * interpolationValue;
                
                // Clamp to int16 range
                resampled[i] = Math.max(-32768, Math.min(32767, Math.round(interpolated)));
            }
            
            return resampled;
        }

        // Record button - start continuous audio streaming
        elements.btnRecord.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const sampleRate = audioContext.sampleRate;
                
                addMessage('info', `AudioContext 采样率: ${sampleRate}Hz`);
                
                // Create ScriptProcessorNode to get raw PCM audio
                scriptProcessor = audioContext.createScriptProcessor(4096, 1, 1);
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(scriptProcessor);
                scriptProcessor.connect(audioContext.destination);
                
                let audioBuffer = [];
                let frameCount = 0;
                
                scriptProcessor.onaudioprocess = (event) => {
                    if (!isRecording) return;
                    
                    const inputData = event.inputBuffer.getChannelData(0);
                    // Convert float32 to int16 PCM
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        const s = Math.max(-1, Math.min(1, inputData[i]));
                        pcmData[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
                    }
                    audioBuffer.push(pcmData);
                    
                    // Resample to 16kHz if needed and send frames
                    // Target: 960 samples at 16kHz (60ms)
                    const targetSamples = Math.round(sampleRate * 0.06); // 60ms
                    let totalSamples = audioBuffer.reduce((a, b) => a + b.length, 0);
                    
                    if (totalSamples >= targetSamples) {
                        const combined = new Int16Array(totalSamples);
                        let offset = 0;
                        for (const buf of audioBuffer) {
                            combined.set(buf, offset);
                            offset += buf.length;
                        }
                        
                        // Resample to 16kHz
                        const resampled = resampleAudio(combined, sampleRate, 16000);
                        
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(resampled.buffer);
                        }
                        
                        frameCount++;
                        if (frameCount % 10 === 0) {
                            addMessage('info', `已发送 ${frameCount} 帧音频`);
                        }
                        
                        audioBuffer = [];
                    }
                };
                
                isRecording = true;
                recordStartTime = Date.now();
                firstAudioReceivedTime = null;
                elements.btnRecord.disabled = true;
                elements.btnStop.disabled = false;
                addMessage('info', '开始实时音频流...');
                
                // Send listen start
                const listen = { type: 'listen', state: 'start' };
                ws.send(JSON.stringify(listen));
                addMessage('sent', '发送 listen start');
                
            } catch (error) {
                addMessage('error', `获取麦克风失败: ${error.message}`);
            }
        });

        // Stop button
        elements.btnStop.addEventListener('click', () => {
            isRecording = false;
            recordStopTime = Date.now();
            const recordDuration = recordStopTime - recordStartTime;
            addMessage('info', `录音时长: ${recordDuration}ms`);
            
            if (scriptProcessor) {
                scriptProcessor.disconnect();
                scriptProcessor = null;
            }
            
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }
            
            // Send listen stop
            const listen = { type: 'listen', state: 'stop' };
            ws.send(JSON.stringify(listen));
            addMessage('sent', '发送 listen stop');
            
            elements.btnRecord.disabled = false;
            elements.btnStop.disabled = true;
            addMessage('info', '已停止音频流');
        });

        function handleMessage(msg) {
            const type = msg.type;
            
            switch (type) {
                case 'hello':
                    addMessage('received', `收到 hello 响应 (session_id=${msg.session_id})`);
                    break;
                case 'stt':
                    addMessage('received', `[STT] ${msg.text}`);
                    break;
                case 'tts':
                    addMessage('received', `[TTS] state=${msg.state}`);
                    break;
                case 'llm_response':
                    addMessage('received', `[LLM] ${msg.text}`);
                    break;
                case 'user_transcript':
                    addMessage('received', `[用户转录] ${msg.text}`);
                    break;
                case 'assistant_text':
                    addMessage('received', `[助手文本] ${msg.text}`);
                    break;
                case 'assistant_audio':
                    addMessage('received', `[助手音频] ${msg.bytes || '...'} 字节`);
                    break;
                case 'pong':
                    addMessage('received', '[PONG]');
                    break;
                case 'error':
                    addMessage('error', `[ERROR] ${msg.message} (fatal=${msg.fatal})`);
                    break;
                default:
                    addMessage('received', `[${type}] ${JSON.stringify(msg)}`);
            }
        }

        function setStatus(state, text) {
            elements.status.className = `status ${state}`;
            elements.statusText.textContent = text;
        }

        function addMessage(type, text) {
            const msg = document.createElement('div');
            msg.className = `message ${type}`;
            const time = new Date().toLocaleTimeString();
            msg.innerHTML = `<span class="timestamp">${time}</span>${text}`;
            elements.messages.appendChild(msg);
            elements.messages.scrollTop = elements.messages.scrollHeight;
        }
    </script>
</body>
</html>
